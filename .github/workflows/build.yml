name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality gates + JVM tests. macOS runners ship the Android SDK, so apiCheck
  # (which compiles the JVM, Android and native klib ABIs) runs here too.
  quality:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Formatting (spotlessCheck)
        run: ./gradlew spotlessCheck

      - name: Static analysis (detekt)
        run: ./gradlew detekt

      - name: Binary compatibility (apiCheck)
        run: ./gradlew apiCheck

      - name: JVM + Android tests
        run: ./gradlew jvmTest testDebugUnitTest

      - name: Coverage gate (koverVerify)
        run: ./gradlew koverVerify

  # Compile every declared target family so a platform-specific break is caught
  # on an OS that can link it.
  multiplatform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: apple
            tasks: >-
              compileKotlinIosArm64 compileKotlinIosSimulatorArm64
              compileKotlinIosX64
          - os: ubuntu-latest
            name: jvm-wasm
            tasks: compileKotlinJvm compileKotlinWasmJs
    name: compile (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile ${{ matrix.name }} targets
        run: ./gradlew ${{ matrix.tasks }}
